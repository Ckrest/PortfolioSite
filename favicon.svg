<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#12141a"/>
  <!-- Top-left facet: purple -->
  <polygon points="16,5 5,16 16,16" fill="#7c5cff"/>
  <!-- Top-right facet: cyan -->
  <polygon points="16,5 27,16 16,16" fill="#00e5ff" opacity="0.9"/>
  <!-- Bottom-left facet: deep purple -->
  <polygon points="5,16 16,27 16,16" fill="#4a36cc"/>
  <!-- Bottom-right facet: teal -->
  <polygon points="27,16 16,27 16,16" fill="#00b8cc"/>
  <!-- Center highlight -->
  <circle cx="16" cy="16" r="1.5" fill="rgba(255,255,255,0.6)"/>
</svg>
