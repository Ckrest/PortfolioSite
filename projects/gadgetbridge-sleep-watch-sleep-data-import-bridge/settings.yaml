  - type: text
    body: A Python tool that classifies sleep data from a Gadgetbridge watch database synced via Syncthing. Rather than relying on an external API, it ports Gadgetbridge's own Java classification algorithms (HuamiExtendedSampleProvider, MiBand2SampleProvider) to Python for accurate sleep stage detection. Reads the Amazfit GTS2 Mini's RAW_KIND values from SQLite, applies a nibble-based classification framework to identify sleep stages, and detects session boundaries using quiet-run analysis. Includes a CLI for exploring raw data and a systemd timer for daily automated imports.
