    body: Two new Wayfire compositor plugins for controlling window layering. The topmost-scene plugin manages a dedicated scene layer for views that should always render above everything else, with XML metadata for configuration. The layer-stacker plugin handles compatibility for layer stacking order control when multiple layer-shell surfaces need to interact correctly. Together they provide proper always-on-top semantics and Z-ordering for the Wayfire desktop.
