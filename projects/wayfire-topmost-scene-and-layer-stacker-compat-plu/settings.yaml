    type: text
    body: A Wayfire compositor plugin that keeps specified windows permanently above all others by pinning them to the root of the scene graph. Windows are matched by app_id namespace from config or pinned at runtime via IPC. A priority system controls stacking order among pinned windows, and original scene positions are preserved for clean restoration on unpin or shutdown.
