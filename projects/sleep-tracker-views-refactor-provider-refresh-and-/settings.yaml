content:
  blocks:
  - body: '## Description:


      Major refactor of sleep-tracker data pipeline and settings-hub integration. Deleted settings_hub_bridge.py (418 lines)
      in favor of a new views.py module with build_day_view(target_date) and build_week_trends(). Added ''view day [--date]''
      and ''view week'' CLI subcommands replacing the bridge''s custom dispatch. Added provider refresh mechanism: collect_command/collect_timeout
      fields in provider config, refresh_all() with ThreadPoolExecutor parallelism, --refresh CLI flag and API query param.
      Fixed datetime.now() to use timezone.utc across providers and routes. Normalized 28K naive DB timestamps. Built 7-day
      tabbed settings-hub view with per-day sources using shell date arithmetic, overnight temp/humidity graphs, and tab_label
      field for dynamic date labels. Reversed tab order (oldest left, today right) with default_tab selecting today.'
    id: blk_8bc744de
    type: text
  - body: '## Reasoning:


      The settings_hub_bridge was a monolithic module coupling data access with presentation. The refactor separates concerns:
      views.py handles presentation, the CLI provides a clean interface for both humans and settings-hub sources, and the
      provider refresh mechanism enables upstream data pulls on demand rather than relying on separate cron-like scheduling.'
    id: blk_1863c512
    type: text
