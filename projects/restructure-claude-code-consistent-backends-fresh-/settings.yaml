    body: 'Unified the Claude Code setup so it works consistently whether using the default Anthropic API, a Z.ai proxy, or a local
      Ollama backend. The old approach used separate config directories per backend which caused lost settings and double-login issues.
      Also replaced a sprawling custom permission system (hundreds of regex rules) with a cleaner hook-based approach using community-maintained
      safety hooks for dangerous command blocking and credential protection.'
