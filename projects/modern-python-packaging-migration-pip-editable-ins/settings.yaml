  - id: blk_8ead3079
    type: text
    body: 'Replaced legacy launcher scripts across 22 Python CLI packages with modern pip editable installs. The old approach used
      fragile path-manipulation hacks that broke easily; the new setup uses standard pyproject.toml entry points that pip manages
      directly. This was a multi-session effort that included deleting old shim scripts, updating systemd service files, fixing MCP
      tool binary references, and cleaning up broken symlinks. Discovered an interesting edge case where flat-layout packages with
      identical module names collide in editable installs — a few packages were left with the old approach for their MCP tools until
      they can be properly restructured.'
