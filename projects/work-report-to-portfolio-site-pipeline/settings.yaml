    - body: '## Step 4: Publish


        So after the work evidence is collected, each type gets added to a database. An AI reads from the database with a
        short explanation to make high quality work reports with minimal effort. The editor is a tool to easily take the information
        from reports and build presentable display pages. And finally, when deploy is clicked in the editor, the changes get
        uploaded to my portfolio site. Along with that, Artifact 3, This project’s portfolio site detail page.'
