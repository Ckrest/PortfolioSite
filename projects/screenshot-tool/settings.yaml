    body: '## Modular Python Package Refactor (Report #17, 2026-01-21)


      Consolidated screenshot-tool from a monolithic 1100-line script plus bash wrapper into a proper Python package with
      12 focused modules. Fixed intermittent window capture failures caused by double-tap detection running before argument
      parsing. Added configurable paths via environment variables. Published to GitHub.


      The original design had double-tap detection running before CLI argument parsing, which caused explicit commands like
      --window to be incorrectly intercepted as double-taps during rapid invocations. The modular structure improves maintainability
      and allows standalone distribution.'
