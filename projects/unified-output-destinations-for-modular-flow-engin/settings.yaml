content:
  blocks:
  - body: Replaced the flow engine's complex resume/persistence system with a simpler output destinations model. Instead of
      managing state for paused and resumed flows, sinks now just declare where their output goes — return it as an API response,
      write it to a file, or print it to console. This made the codebase significantly simpler and the mental model much clearer
      for anyone building flows.
