  - body: Simplified the portfolio site so every project always gets its own detail page instead of some linking directly
      to GitHub or external URLs. This removed a bunch of conditional logic and made the editor more consistent — you can
      always edit blocks for any project now. Also fixed a bug where dragging an artifact image onto the project header would
      show a false "preview not found" warning on save because the validation ran before the file was actually copied into
      place.
