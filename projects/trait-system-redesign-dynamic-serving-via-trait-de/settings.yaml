content:
  blocks:
  - body: Major architecture change to how the Systems registry handles traits. Previously, trait data was embedded in package
      manifests and the API needed hardcoded transforms to serve it. The new design moves trait data into separate files and
      lets each trait define its own schema, resolution logic, and API output format. Packages just provide data — the API
      serves it dynamically without code changes. Also overhauled the trait vocabulary, adding new traits and retiring ones
      that no longer fit the model.
