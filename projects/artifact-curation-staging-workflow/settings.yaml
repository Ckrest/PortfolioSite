  - body: Added a staging workflow for work report artifacts, modeled after git's staging area concept. Screenshots, code
      snippets, and other evidence from a work session get collected into a pool where they can be reviewed and curated before
      being attached to the final report. Includes AI-powered relevance scoring using local vision models to help sort useful
      artifacts from noise, while keeping human oversight for the final call.
