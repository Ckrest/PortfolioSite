    body: 'Expanded the work report editing API so that all report fields — including commit references, git stats, dates, and artifacts
      — can be modified after initial creation. Previously, correcting metadata required manual database edits. Now the same edit
      capabilities are available through the CLI, the MCP tool interface, and the core library, with proper validation and protection
      against accidentally modifying archived reports.'
