    type: text
    body: 'Redesigned work report creation from a single-shot CLI command into an interactive wizard. The new flow walks through
      four phases: entering required fields, reviewing auto-discovered evidence (git diffs, screenshots, etc.), answering verification
      questions about what was done and why, and confirming the final report. The old approach tried to infer work duration from
      file timestamps, which was unreliable — now duration is always stated explicitly.'
