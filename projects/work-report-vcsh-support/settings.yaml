content:
  blocks:
  - body: Added vcsh multi-repo support to the work report system so git diffs and commit tracking work correctly in the Systems
      environment. Previously, git operations assumed a single repo per directory — but Systems uses vcsh to overlay multiple
      repos in the same home directory. The fix detects when a project corresponds to a vcsh repo and routes all git commands
      through vcsh accordingly.
