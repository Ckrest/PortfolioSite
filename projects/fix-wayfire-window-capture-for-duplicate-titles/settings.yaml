    type: text
    body: 'Fixed a bug in Wayfire''s image capture protocol where windows with the same title (like multiple terminal instances)
      would all end up with the same thumbnail. The original code was matching windows by name, so duplicates always resolved to
      the first match. Switched to using direct object references for reliable per-window capture.'
