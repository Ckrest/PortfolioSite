  - body: '## Description:


      Discovered that core.excludesFile was broken across ALL 62 vcsh repos -- relative paths (.gitignore.d/name) couldn''t
      be resolved by git since GIT_DIR is at ~/.config/vcsh/repo.d/. This made every excludes file non-functional (4713 untracked
      files for systems repo alone). Fixed all 62 repos to absolute paths. Extended sysreg_vcsh_sync to auto-generate per-package
      ~/.gitignore.d/name excludes files with common build artifact patterns (from new COMMON_IGNORE_PATTERNS constant). Added
      systems-owned file patterns (manifest.yaml, NOTES.md, trait_*.yaml) per-package based on traits to suppress cross-repo
      noise. Added health checks to vcsh_status() for missing/misconfigured excludes. Updated CLI output and MCP tool description.
      Result: every package repo is fully clean with zero untracked noise.'
    id: blk_b8657e5e
    type: text
  - body: '## Reasoning:


      The root cause was a path resolution mismatch between how vcsh configures git repos and how git resolves relative core.excludesFile
      paths. This had been silently broken since the repos were created. The fix required both an immediate config correction
      and infrastructure changes to prevent drift going forward (auto-generation in sync, health checks in status).'
    id: blk_9dd774e8
    type: text
