content:
  blocks:
  - body: Discovered that git exclude files were silently non-functional across all vcsh repos due to a relative path issue
      — git couldn't resolve the paths because vcsh stores its git directories in a non-standard location. Fixed all repos
      to use absolute paths and built auto-generation into the sync tooling so each package gets its own excludes file with
      common ignore patterns. The result was going from thousands of noisy untracked files to clean status output across the
      board.
