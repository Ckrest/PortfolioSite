content:
  blocks:
  - body: Previously, AI agents could only attach pre-existing artifacts to work reports. This update lets them actively create
      evidence during the report flow — taking browser screenshots, generating diagrams, or registering data files as they
      answer verification questions. The work report wizard now hints at which creation tools are available for each question,
      and a new generic registration tool handles artifact types that don't have dedicated capture tools.
