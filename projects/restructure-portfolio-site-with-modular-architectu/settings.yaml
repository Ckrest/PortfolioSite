    body: 'Rebuilt the portfolio site from scratch, replacing a 900-line monolithic HTML file with a modular architecture. Each section
      (header, hero, timeline, etc.) now lives in its own module, CSS is organized into a token-based design system, and every project
      has its own settings.yaml that gets built into a manifest at deploy time. The main motivation was making project data machine-readable
      so external tools (like the portfolio editor) could create and update projects programmatically rather than through manual
      YAML editing.'
