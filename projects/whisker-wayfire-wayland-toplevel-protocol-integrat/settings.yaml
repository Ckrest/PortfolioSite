content:
  blocks:
  - body: 'XFCE''s Whisker Menu didn''t know how to detect focus loss on Wayland, so clicking away from the menu on the Wayfire
      compositor wouldn''t close it. Added Wayland toplevel protocol support so the menu can monitor window activation changes and
      auto-hide when something else gets focus — matching the behavior users expect from the X11 version. This required integrating
      a Wayland protocol into the existing GTK/XFCE plugin architecture in C++.'
