content:
  blocks:
  - body: Major simplification of the work report creation flow. The old approach required 7+ MCP round-trips with complex
      session state tracked in the database. Replaced it with a straightforward create-then-curate model. Also reworked artifact
      discovery to query tool operations instead of a dedicated artifacts table, which fixed a data pollution issue and made
      it trivial to add new artifact sources. Removed about 700 lines of dead code from the old staging and curation systems.
