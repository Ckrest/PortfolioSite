content:
  blocks:
  - body: '## Description:


      Added tag-to-icon mapping service that automatically assigns icons from the shared library when portfolio projects are
      created. New projects get an icon based on their tags — domain tags (Wayland, ComfyUI, Audio, etc.) take priority, then
      skill tags (Python, React, Rust), with code.svg as fallback. Work-type tags (Feature, Bug Fix) are skipped. Includes
      a backfill script that assigned icons to all 24 existing projects that lacked them.'
    id: blk_fd93fda0
    type: text
  - body: '## Reasoning:


      Portfolio projects created from work reports landed without icons, showing broken images on the timeline for small (icon-card)
      projects. Manual icon selection doesn''t scale. The shared icon library already had 57 SVGs and projects already carry
      tags, so mapping tags to icons at creation time was a natural fit.'
    id: blk_4e59a0f6
    type: text
