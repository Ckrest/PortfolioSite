# Auto-assign icons to portfolio projects from tags

title: Auto-assign icons to portfolio projects from tags
summary: Added tag-to-icon mapping service
date: '2026-02-22'
status: in-progress
size: medium
icon: icon.svg
tags:
- Python
- Feature
- Flask
- Automation
description: Added tag-to-icon mapping service that automatically assigns icons from the shared library when portfolio projects
  are created. New projects get an icon based on their tags — domain tags (Wayland, ComfyUI, Audio, etc.) take priority, then
  skill tags (Python, React, Rust), with code.svg as fallback. Work-type tags (Feature, Bug Fix) are skipped. Includes a backfill
  script that assigned icons to all 24 existing projects that lacked them.
