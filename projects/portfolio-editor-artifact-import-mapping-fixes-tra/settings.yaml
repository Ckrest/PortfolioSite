    body: 'Made the portfolio editor smarter about how it converts work report artifacts into content blocks. Instead of a simple
      type-to-type mapping, the importer now inspects the shape of the data to pick the right block type — for example, inferring
      whether a data artifact should become a gallery or a comparison. Also built a one-time migration script to fix blocks that
      were imported with the old logic, with backup support for safe rollback.'
