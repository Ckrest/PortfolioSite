description: 'Refactored govee-temp-logger startup lifecycle so `download_on_startup=true` runs only `BACKFILL_ALL -> LIVE`,
  removing redundant `CONNECT_ALL` probe session that caused extra connect/disconnect churn per device.


  Implemented regression tests for startup phase selection, updated CLI/help/docs to match lifecycle semantics, and revalidated
  runtime behavior with systemd/journal checks.


  Operational verification included restart runs with Bedside-only and then both Bedside+Door enabled; confirmed backfill
  completion and live advertisement ingest for both devices.'
