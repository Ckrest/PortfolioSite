  - body: 'This was a full greenfield app build — from `create-expo-app` scaffold to a working, published Android app with
      non-trivial features (animated range slider, SAF storage with conflict handling, notification scheduling, swipe navigation).
      High effort due to the breadth of concerns: gesture handling, animated UI, file system persistence with backup strategy,
      notification permissions, and the final publication pass. The sleep time slider alone required worklet-based position
      math, snap-to-grid logic, and animated reaction bridging.'
