    body: Moved artifact storage from its own database table into the existing operations table as JSONB config fields. This simplified the pipeline since artifacts are now just metadata attached to the operations that created them. Also unified the three separate registries (handlers, artifact sources, and type mappings) so they all agree on what types exist and how to handle them.
