content:
  blocks:
  - body: Reworked how Desktop HUD manages its display elements. Previously, element definitions lived in both the config
      file and layout files, creating a confusing dual-source situation. Now layout files are the single source of truth —
      they store the full element config including type, renderer, data provider, position, and size. The main config just
      declares which layouts to load at startup. Also added profile-based startup, CLI flags for profile selection, and a
      REST endpoint for additive profile loading.
