    body: Replaced the class-based evidence handler system with a declarative artifact source registry. Instead of writing a handler class for each artifact type, sources are now defined as configuration entries with their discovery queries and type mappings. This made it much easier to add new artifact sources and removed a lot of boilerplate code.
