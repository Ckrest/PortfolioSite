content:
  blocks:
  - body: Hardened the ext-toplevel-image-capture protocol plugin to handle real-world failure modes that come up during extended
      capture sessions. Added a watchdog timer that detects and recovers from stalled frame captures, output migration handling
      so capture survives monitor hotplug and workspace moves, and view lifecycle tracking to maintain capture when windows
      are created or destroyed. These are the kinds of edge cases that silently break recording pipelines in multi-monitor
      setups.
