  - body: Added Mermaid diagram support across three layers. The portfolio site gained a Mermaid block renderer so diagrams display natively on project pages. A new system-visualizer package auto-generates flowcharts, timelines, and dependency graphs from the systems history database. And a mermaid-tool package provides 9 templates, AI-assisted generation via Ollama, a CLI wizard, and syntax validation. All three tools register their output as discoverable artifacts for work reports.
