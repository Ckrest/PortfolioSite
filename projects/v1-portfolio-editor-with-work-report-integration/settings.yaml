# Portfolio Editor

title: Portfolio Editor
summary: Web-based portfolio editor with work report integration, drag-and-drop blocks, and live preview.
date: '2026-01-27'
status: in-progress
size: large
github: https://github.com/Ckrest/PortfolioSite
