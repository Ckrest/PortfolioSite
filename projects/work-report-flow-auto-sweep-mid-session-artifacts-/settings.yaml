content:
  blocks:
  - body: When an AI agent creates artifacts during a work report session, they used to need to manually pass artifact IDs
      back through the flow. This update makes the completion step automatically discover any artifacts registered during
      the session window. Also added a CLI flag for attaching artifacts to existing reports after the fact, and fixed a bug
      where the MCP command template left orphaned flags when optional parameters were empty.
