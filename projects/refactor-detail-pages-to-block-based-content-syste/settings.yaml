content:
  blocks:
  - body: Replaced the portfolio site's rigid detail page system (which had separate render modes for readme, pdf, structured,
      and minimal pages) with a flexible block-based content model. Each project page is now composed from an ordered array
      of typed blocks — text, images, videos, galleries, code, and more — that can be freely arranged in the editor. This
      also simplified the project schema and added a live preview API so the editor can show changes in real time.
