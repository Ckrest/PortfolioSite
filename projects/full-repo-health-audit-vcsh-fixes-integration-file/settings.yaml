      \ if we're in a Systems environment\n    ensure_importable(\"audio-tools\")\n    SYSTEMS_ROOT = None  # Not needed when\
      \ using Systems API\nexcept ImportError:\n    # Fallback for standalone usage\n    SYSTEMS_ROOT = os.environ.get(\"\
      SYSTEMS_ROOT\", os.path.expanduser(\"~/Systems\"))\n    def get_package_path(name):\n        \"\"\"Fallback package\
      \ path resolution for non-Systems environments.\"\"\"\n        return Path(SYSTEMS_ROOT) / \"tools\" / name\n    def\
      \ ensure_importable(name):\n        \"\"\"No-op ensure_importable for non-Systems environments.\"\"\"\n        return\
      \ True\n\nPDF_OUTPUT = os.environ.get(\"PDF_OUTPUT\", str(Path(__file__).resolve().parents[2] / \"output\"))\n\n\ndef\
      \ _json_out(data):\n    print(json.dumps(data))\n    sys.exit(0)\n\n\ndef _run_text_to_audio(text_file, voice_file,\
      \ seed):\n    \"\"\"Run text-to-audio via audio-tools CLI.\"\"\"\n    audio_tools_path = get_package_path(\"audio-tools\"\
      )\n    audio_cli = str(audio_tools_path / \"src\" / \"cli.py\")\n    try:\n        result = subprocess.run(\n      \
      \      [sys.executable, audio_cli, \"text-to-audio\",\n             \"--text-file\", text_file,\n             \"--voice-file\"\
      , voice_file,\n             \"--seed\", str(seed)],\n            capture_output=True,\n            text=True,\n    \
      \        timeout=120\n        )\n        if result.stdout.strip():\n            try:\n                return json.loads(result.stdout.strip())\n\
      \            except json.JSONDecodeError:\n                pass\n        return {\"status\": \"error\", \"error\": result.stderr.strip()\
      \ or \"Unknown error\"}\n    except Exception as e:\n        return {\"status\": \"error\", \"error\": f\"TTS failed:\
      \ {e}\"}\n\n\ndef scan_unmatched_pdfs(pdfs_folder):\n    \"\"\"Scan for PDF files without matching .txt files.\"\"\"\
      \n    pdf_folder_path = Path(pdfs_folder)\n    if not pdf_folder_path.exists():\n        return []\n\n    unmatched\
