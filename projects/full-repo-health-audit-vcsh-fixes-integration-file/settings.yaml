    language: python
    code: "\"\"\"Shared constants for Systems registry.\"\"\"\n\nfrom typing import List, Set\n\n# Files always owned by vcsh\
      \ systems (structural, not in traits)\n# NOTE: find_untracked_systems_files() in vcsh_tracking.py has its own\n# scanning\
      \ logic that must be kept in sync with this list.\nIMPLICIT_SYSTEMS_PATTERNS: List[str] = [\"manifest.yaml\", \"NOTES.md\"\
      , \"trait_*.yaml\", \"hooks.local/*\", \"config.local.yaml\"]\n\n# Build artifacts and caches to ignore in no-repo packages\n\
      NO_REPO_IGNORE_PATTERNS: Set[str] = {\n    \"__pycache__\", \".pyc\", \".pyo\", \".egg-info\", \".eggs\",\n    \".mypy_cache\"\
      , \".pytest_cache\", \".ruff_cache\",\n    \"node_modules\", \".tox\", \".venv\", \"venv\",\n    \".git\",\n}\n\n# File\
      \ patterns by type\nFILE_PATTERNS = {\n    \"trait\": \"trait_*.yaml\",\n    \"manifest\": \"manifest.yaml\",\n    \"\
      notes\": \"NOTES.md\",\n    \"yaml\": \"*.yaml\",\n    \"yml\": \"*.yml\",\n}\n\n# Trait skip sets for different package\
      \ types\nSKIP_TRAITS = {\n    \"vcsh_split\": {\"no-repo\", \"standalone-git\", \"untracked\"},\n    \"standalone_only\"\
      : {\"standalone-git\", \"untracked\"},\n}\n"
