      \n        if not txt_file.exists():\n            unmatched.append(pdf_file.name)\n    return sorted(unmatched)\n\n\n\
      def do_pdf_to_audio(pdf_filename, pdfs_folder, voice_file, seed):\n    \"\"\"Process a single PDF to audio. Returns\
