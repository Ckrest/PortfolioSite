      }\n    except Exception as e:\n        return {\"status\": \"error\", \"error\": f\"Failed to extract text: {e}\"}\n\
      \n    text_filename = pdf_path.stem + \".txt\"\n    text_path = Path(pdfs_folder) / text_filename\n\n    try:\n    \
