      \ += f\"{i} - {pdf}\\n\"\n        return {\n            \"action\": \"select\",\n            \"message\": message.strip(),\n\
      \            \"unmatched_pdfs\": unmatched,\n            \"count\": len(unmatched)\n        }\n\n    pdf_path = Path(pdfs_folder)\
