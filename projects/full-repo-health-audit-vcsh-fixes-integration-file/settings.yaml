      text_length\")\n            })\n\n    _json_out(results)\n\n\ndef main():\n    parser = argparse.ArgumentParser(description=\"\
      PDF tools CLI\")\n    parser.add_argument(\"--version\", action=\"version\", version=\"%(prog)s 0.1.0\")\n    sub =\
      \ parser.add_subparsers(dest=\"command\", required=True)\n\n    p = sub.add_parser(\"pdf-to-audio\")\n    p.add_argument(\"\
      --pdf-filename\", default=None)\n    p.add_argument(\"--pdfs-folder\", default=None)\n    p.add_argument(\"--voice-file\"\
      , default=\"FemaleVoice.wav\")\n    p.add_argument(\"--seed\", type=int, default=2219471745)\n\n    p = sub.add_parser(\"\
      pdf-to-audio-batch\")\n    p.add_argument(\"--pdf-filenames\", required=True)\n    p.add_argument(\"--pdfs-folder\"\
