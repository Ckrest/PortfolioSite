      \   unmatched = scan_unmatched_pdfs(pdfs_folder)\n        if not unmatched:\n            return {\"action\": \"none\"\
      , \"message\": \"No PDFs without matching .txt files found\"}\n        if len(unmatched) == 1:\n            return do_pdf_to_audio(unmatched[0],\
      \ pdfs_folder, voice_file, seed)\n        message = f\"Found {len(unmatched)} unmatched PDFs. Please select:\\n\"\n\
