    code: "#!/usr/bin/env python3\n\"\"\"\nSystems Registry CLI\n\nThin wrapper around the Systems Python API for registry\
      \ operations.\n\"\"\"\n\nimport argparse\nimport json\nimport os\nimport sys\nimport time\n\nVERSION = \"0.1.0\"\n\n\
      _CONFIG_DEFAULTS = {\n    \"systems_root\": \"(derived from package location or $SYSTEMS_ROOT)\",\n    \"registry_dir\"\
      : \"registry\",\n    \"tier_dirs\": [\"ai\", \"desktop\", \"infra\", \"tools\"],\n    \"traits_dir\": \"registry/traits\"\
      ,\n}\n\n_CONFIG_SCHEMA = {\n    \"$schema\": \"https://json-schema.org/draft/2020-12/schema\",\n    \"type\": \"object\"\
      ,\n    \"properties\": {\n        \"systems_root\": {\"type\": \"string\", \"description\": \"Root directory for Systems\"\
      },\n        \"registry_dir\": {\"type\": \"string\", \"description\": \"Registry directory relative to systems_root\"\
      },\n        \"tier_dirs\": {\n            \"type\": \"array\",\n            \"items\": {\"type\": \"string\"},\n   \
      \         \"description\": \"Package tier directories relative to systems_root\",\n        },\n        \"traits_dir\"\
      : {\"type\": \"string\", \"description\": \"Traits definition directory relative to systems_root\"},\n    },\n    \"\
      additionalProperties\": False,\n}\n\n\ndef _emit_json(payload: dict):\n    \"\"\"Print JSON to stdout for introspection\
      \ flags.\"\"\"\n    print(json.dumps(payload, indent=2, sort_keys=True))\n\n\ndef _handle_introspection(args) -> int\
      \ | None:\n    \"\"\"Handle introspection flags, returning exit code or None to continue.\"\"\"\n    if getattr(args,\
      \ \"print_defaults\", False):\n        _emit_json(dict(_CONFIG_DEFAULTS))\n        return 0\n\n    if getattr(args,\
      \ \"print_config_schema\", False):\n        _emit_json(_CONFIG_SCHEMA)\n        return 0\n\n    if getattr(args, \"\
      validate_config\", False):\n        # Config is always valid (env-based, no config file)\n        return 0\n\n    if\
      \ getattr(args, \"print_resolved\", False):\n        from .paths import SYSTEMS_ROOT\n        resolved = dict(_CONFIG_DEFAULTS)\n\
      \        resolved[\"systems_root\"] = str(SYSTEMS_ROOT)\n        _emit_json(resolved)\n        return 0\n\n    return\
      \ None\n\nfrom .api import (\n    list_packages,\n    search_packages,\n    get_package,\n    validate_registry,\n \
      \   validate_package,\n    validate_all,\n    create_package,\n    update_package,\n    list_types,\n    list_entries,\n\
      \    get_entry,\n    search_entries,\n    validate_entries,\n    get_publishable_packages,\n    get_publish_status,\n\
      \    push_package,\n    push_all,\n    vcsh_sync,\n    vcsh_audit,\n    vcsh_status,\n    list_traits,\n    get_trait_definition,\n\
      \    get_tag_vocabulary,\n    get_tag_entries,\n    list_atomics,\n    get_atomic,\n    execute_atomic,\n    get_expected_files,\n\
      \    get_setup_guide,\n    get_pure_package_files,\n    create_pure_package_preview,\n    clear_pure_package_previews,\n\
      \    validate_cross_package,\n    get_overview,\n    get_layout,\n)\n\n\ndef format_package_list(packages: list[dict],\
      \ verbose: bool = False) -> str:\n    if not packages:\n        return \"No packages found.\"\n\n    output = []\n \
      \   for pkg in packages:\n        state = pkg.get(\"state\", \"unknown\")\n        state_icon = {\n            \"ready\"\
      : \"[green]+[/green]\",\n            \"draft\": \"[yellow]~[/yellow]\",\n            \"disabled\": \"[dim]-[/dim]\"\
      ,\n            \"archived\": \"[dim]x[/dim]\",\n        }.get(state, \"?\")\n\n        traits_str = \", \".join(pkg.get(\"\
      traits\", [])[:3]) if pkg.get(\"traits\") else \"-\"\n        if len(pkg.get(\"traits\", [])) > 3:\n            traits_str\
      \ += f\" (+{len(pkg['traits']) - 3})\"\n\n        desc = pkg.get(\"description\", \"\")\n        if len(desc) > 55:\n\
      \            desc = desc[:52] + \"...\"\n\n        output.append(f\"{state_icon} {pkg['name']} [{pkg.get('tier', '?')}]\"\
      )\n        output.append(f\"   {desc}\")\n        if verbose:\n            output.append(f\"   traits: {traits_str}\"\
      )\n            if pkg.get(\"tags\"):\n                output.append(f\"   tags: {', '.join(pkg['tags'])}\")\n      \
      \  output.append(\"\")\n\n    return \"\\n\".join(output)\n\n\ndef format_package_detail(pkg: dict) -> str:\n    if\
      \ not pkg:\n        return \"Package not found.\"\n\n    output = [\n        f\"# {pkg.get('name', 'Unknown')}\",\n\
      \        f\"Tier: {pkg.get('tier', '?')}\",\n        f\"State: {pkg.get('state', 'unknown')}\",\n        f\"Path: {pkg.get('path',\
      \ '?')}\",\n        \"\",\n        \"## Description\",\n        pkg.get(\"description\", \"No description\"),\n    \
      \    \"\",\n    ]\n\n    if pkg.get(\"traits\"):\n        output.append(\"## Traits\")\n        output.append(\", \"\
      .join(pkg[\"traits\"]))\n        output.append(\"\")\n\n    if pkg.get(\"tags\"):\n        output.append(\"## Tags\"\
      )\n        output.append(\", \".join(pkg[\"tags\"]))\n        output.append(\"\")\n\n    if pkg.get(\"depends_on\"):\n\
      \        output.append(\"## Dependencies\")\n        for dep in pkg[\"depends_on\"]:\n            output.append(f\"\
      - {dep}\")\n        output.append(\"\")\n\n    return \"\\n\".join(output)\n\n\ndef format_validation_results(results:\
      \ dict) -> str:\n    failed_pkgs = {}\n    warning_pkgs = {}\n    passed = 0\n\n    for name, (valid, error_list, _duration)\
      \ in results.items():\n        pkg_errors = [e for e in error_list if not e.startswith(\"[warning]\")]\n        pkg_warnings\
      \ = [e[10:] for e in error_list if e.startswith(\"[warning]\")]\n        if pkg_errors:\n            failed_pkgs[name]\
      \ = len(pkg_errors)\n        elif pkg_warnings:\n            warning_pkgs[name] = len(pkg_warnings)\n        else:\n\
      \            passed += 1\n\n    total = len(results)\n    output = [f\"Validated {total} packages: {passed} passed,\
      \ {len(failed_pkgs)} failed\"]\n\n    if failed_pkgs:\n        output.append(\"\")\n        output.append(\"FAILED:\"\
      )\n        for name, count in failed_pkgs.items():\n            label = \"error\" if count == 1 else \"errors\"\n  \
      \          output.append(f\"  {name} ({count} {label})\")\n\n    if warning_pkgs:\n        output.append(\"\")\n   \
      \     output.append(\"WARNINGS:\")\n        for name, count in warning_pkgs.items():\n            label = \"warning\"\
      \ if count == 1 else \"warnings\"\n            output.append(f\"  {name} ({count} {label})\")\n\n    if not failed_pkgs\
      \ and not warning_pkgs:\n        output.append(\"All manifests valid!\")\n\n    if failed_pkgs or warning_pkgs:\n  \
      \      output.append(\"\")\n        output.append(\"Use --name <package> for full details.\")\n\n    return \"\\n\"\
      .join(output)\n\n\ndef cmd_types(args) -> int:\n    types = list_types()\n    if args.text:\n        for t in types:\n\
      \            print(t)\n        return 0\n    print(json.dumps(types, indent=2))\n    return 0\n\n\ndef cmd_entries(args)\
      \ -> int:\n    entries = list_entries(args.type)\n    if args.text:\n        if not entries:\n            print(\"No\
      \ entries found.\")\n            return 0\n        for entry in entries:\n            entry_id = entry.get(\"id\", \"\
      ?\")\n            title = entry.get(\"title\", \"\")\n            print(f\"{entry_id} {('- ' + title) if title else\
      \ ''}\".rstrip())\n        return 0\n    print(json.dumps(entries, indent=2))\n    return 0\n\n\ndef cmd_entry(args)\
      \ -> int:\n    entry = get_entry(args.type, args.id)\n    if not entry:\n        print(json.dumps({\"error\": \"Entry\
      \ not found.\"}))\n        return 1\n    print(json.dumps(entry, indent=2))\n    return 0\n\n\ndef cmd_search_entries(args)\
      \ -> int:\n    entries = search_entries(args.type, args.query)\n    if args.text:\n        if not entries:\n       \
      \     print(\"No entries found.\")\n            return 0\n        for entry in entries:\n            entry_id = entry.get(\"\
      id\", \"?\")\n            title = entry.get(\"title\", \"\")\n            print(f\"{entry_id} {('- ' + title) if title\
      \ else ''}\".rstrip())\n        return 0\n    print(json.dumps(entries, indent=2))\n    return 0\n\n\ndef cmd_validate_entries(args)\
      \ -> int:\n    result = validate_entries(args.type)\n    if args.text:\n        errors = result.get(\"errors\", {})\n\
      \        if not errors:\n            print(\"All entries valid\")\n            return 0\n        print(\"Validation\
      \ errors:\")\n        for entry_id, entry_errors in errors.items():\n            print(f\"- {entry_id}\")\n        \
      \    for err in entry_errors:\n                print(f\"  - {err}\")\n        return 1\n    print(json.dumps(result,\
      \ indent=2))\n    return 0 if result.get(\"valid\") else 1\n\n\ndef cmd_search(args) -> int:\n    results = search_packages(args.query)\n\
      \n    if args.trait:\n        results = [p for p in results if args.trait in p.get(\"traits\", [])]\n    if args.tier:\n\
      \        results = [p for p in results if p.get(\"tier\") == args.tier]\n    if args.tag:\n        results = [p for\
      \ p in results if args.tag in p.get(\"tags\", [])]\n\n    if args.text:\n        if not results:\n            print(f\"\
      No packages found matching '{args.query}'.\")\n        else:\n            print(f\"Found {len(results)} package(s) matching\
      \ '{args.query}':\\n\")\n            print(format_package_list(results, verbose=True))\n    else:\n        print(json.dumps(results,\
      \ indent=2))\n\n    return 0\n\n\ndef cmd_list(args) -> int:\n    packages = list_packages()\n\n    if args.tier:\n\
      \        packages = [p for p in packages if p.get(\"tier\") == args.tier]\n    if args.trait:\n        packages = [p\
      \ for p in packages if args.trait in p.get(\"traits\", [])]\n    if args.tag:\n        packages = [p for p in packages\
      \ if args.tag in p.get(\"tags\", [])]\n    if args.state:\n        packages = [p for p in packages if p.get(\"state\"\
      ) == args.state]\n\n    if args.text:\n        by_tier = {}\n        for pkg in packages:\n            tier = pkg.get(\"\
      tier\", \"unknown\")\n            if tier not in by_tier:\n                by_tier[tier] = []\n            by_tier[tier].append(pkg)\n\
      \n        output = []\n        for tier_name in [\"desktop\", \"ai\", \"infra\", \"tools\"]:\n            tier_pkgs\
      \ = by_tier.get(tier_name, [])\n            if not tier_pkgs:\n                continue\n            output.append(f\"\
      \\n## {tier_name.upper()} ({len(tier_pkgs)})\\n\")\n            output.append(format_package_list(tier_pkgs, verbose=args.verbose))\n\
      \n        print(\"\\n\".join(output) if output else \"No packages found.\")\n    else:\n        print(json.dumps(packages,\
      \ indent=2))\n\n    return 0\n\n\ndef cmd_get(args) -> int:\n    pkg = get_package(args.name)\n\n    if not pkg:\n \
      \       all_packages = list_packages()\n        similar = [p[\"name\"] for p in all_packages if args.name.lower() in\
      \ p[\"name\"].lower()]\n        if args.text:\n            if similar:\n                print(f\"Package '{args.name}'\
      \ not found. Did you mean: {', '.join(similar)}?\")\n            else:\n                print(f\"Package '{args.name}'\
      \ not found.\")\n        else:\n            print(json.dumps({\"error\": f\"Package '{args.name}' not found.\", \"similar\"\
      : similar}))\n        return 1\n\n    if args.text:\n        print(format_package_detail(pkg))\n    else:\n        print(json.dumps(pkg,\
      \ indent=2))\n\n    return 0\n\n\ndef cmd_validate(args) -> int:\n    if args.name:\n        valid, errors = validate_package(args.name)\n\
      \        if args.text:\n            if valid:\n                print(f\"{args.name}: Valid\")\n            else:\n \
      \               print(f\"{args.name}: Invalid\")\n                for error in errors:\n                    print(f\"\
      \  - {error}\")\n        else:\n            print(json.dumps({\"name\": args.name, \"valid\": valid, \"errors\": errors}))\n\
      \        return 0 if valid else 1\n\n    # Registry integrity gate (runs before all-packages validation)\n    reg_valid,\
      \ reg_errors = validate_registry()\n    if not reg_valid:\n        if args.text:\n            print(\"Registry integrity\
      \ errors:\")\n            for error in reg_errors:\n                print(f\"  - {error}\")\n            print(\"\\\
      nFix registry issues before validating packages.\")\n        else:\n            print(json.dumps({\n               \
      \ \"registry\": {\"valid\": False, \"errors\": reg_errors},\n                \"packages\": {}\n            }, indent=2))\n\
      \        return 1\n\n    t0 = time.monotonic()\n    results = validate_all()\n    cross_pkg = validate_cross_package()\n\
      \    total_duration = round(time.monotonic() - t0, 3)\n\n    if args.text:\n        print(format_validation_results(results))\n\
      \        if cross_pkg[\"errors\"]:\n            print(\"\\nCross-package issues:\")\n            for err in cross_pkg[\"\
      errors\"]:\n                print(f\"  - {err}\")\n        print(f\"\\nTotal time: {total_duration:.1f}s\")\n    elif\
      \ args.full:\n        output = {\n            \"registry\": {\"valid\": True, \"errors\": []},\n            \"total_duration_s\"\
      : total_duration,\n            \"packages\": {},\n            \"cross_package\": cross_pkg,\n        }\n        for\
      \ name, (valid, error_list, duration) in results.items():\n            output[\"packages\"][name] = {\"valid\": valid,\
      \ \"errors\": error_list, \"duration_s\": duration}\n        print(json.dumps(output, indent=2))\n    else:\n      \
      \  # Default JSON: compact summary with counts only\n        total_errors = 0\n        total_warnings = 0\n        packages\
      \ = {}\n        for name, (valid, error_list, duration) in results.items():\n            pkg_errors = sum(1 for e in\
      \ error_list if not e.startswith(\"[warning]\"))\n            pkg_warnings = sum(1 for e in error_list if e.startswith(\"\
      [warning]\"))\n            total_errors += pkg_errors\n            total_warnings += pkg_warnings\n            packages[name]\
      \ = {\"valid\": valid, \"errors\": pkg_errors, \"warnings\": pkg_warnings, \"duration_s\": duration}\n        valid_count\
      \ = sum(1 for v, _, _d in results.values() if v)\n        output = {\n            \"registry\": {\"valid\": True, \"\
      errors\": []},\n            \"total\": len(results),\n            \"valid\": valid_count,\n            \"errors\": total_errors,\n\
      \            \"warnings\": total_warnings,\n            \"total_duration_s\": total_duration,\n            \"packages\"\
      : packages,\n            \"cross_package\": cross_pkg,\n        }\n        print(json.dumps(output, indent=2))\n\n \
      \   has_errors = any(\n        not valid and any(not e.startswith(\"[warning]\") for e in errors)\n        for valid,\
      \ errors, _d in results.values()\n    )\n    return 1 if has_errors else 0\n\n\ndef cmd_validate_filter(args) -> int:\n\
      \    \"\"\"List packages filtered by validation health.\"\"\"\n    results = validate_all()\n\n    # Classify each package\n\
      \    classified = []\n    for name, (valid, error_list, _duration) in sorted(results.items()):\n        pkg_errors =\
      \ [e for e in error_list if not e.startswith(\"[warning]\")]\n        pkg_warnings = [e for e in error_list if e.startswith(\"\
      [warning]\")]\n        classified.append({\n            \"name\": name,\n            \"errors\": len(pkg_errors),\n\
      \            \"warnings\": len(pkg_warnings),\n            \"error_messages\": pkg_errors,\n            \"warning_messages\"\
      : pkg_warnings,\n        })\n\n    # Filter: --clean means 0 issues, --issues (or default) means has issues\n    if\
      \ args.clean:\n        filtered = [p for p in classified if p[\"errors\"] == 0 and p[\"warnings\"] == 0]\n    else:\n\
      \        # --issues or default\n        filtered = [p for p in classified if p[\"errors\"] > 0 or p[\"warnings\"] >\
      \ 0]\n\n    if args.text:\n        label = \"clean\" if args.clean else \"with issues\"\n        print(f\"Packages {label}:\
      \ {len(filtered)}/{len(classified)}\")\n        for p in filtered:\n            parts = []\n            if p[\"errors\"\
      ]:\n                parts.append(f\"{p['errors']} errors\")\n            if p[\"warnings\"]:\n                parts.append(f\"\
      {p['warnings']} warnings\")\n            suffix = f\"  ({', '.join(parts)})\" if parts else \"\"\n            print(f\"\
      \  {p['name']}{suffix}\")\n            for msg in p[\"error_messages\"]:\n                print(f\"    - {msg}\")\n\
      \            for msg in p[\"warning_messages\"]:\n                print(f\"    - {msg}\")\n    else:\n        print(json.dumps({\n\
      \            \"packages\": filtered,\n            \"total\": len(classified),\n            \"matched\": len(filtered),\n\
      \        }, indent=2))\n\n    return 0\n\n\ndef cmd_create(args) -> int:\n    traits = []\n    if args.traits:\n   \
      \     traits = [t.strip() for t in args.traits.split(\",\") if t.strip()]\n\n    result = create_package(\n        name=args.name,\n\
