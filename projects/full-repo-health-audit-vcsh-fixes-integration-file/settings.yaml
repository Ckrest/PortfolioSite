status: in-progress
size: medium
linkTo: detail
description: 'Comprehensive audit and cleanup across the Systems registry, touching 14 vcsh repos in a single session.


  ## Key changes


  ### vcsh infrastructure fixes

  - **CWD-safe add_commands**: Added `cd` prefix to all add_command strings in vcsh_tracking.py so commands work regardless
  of current working directory. Previously, running add commands from package directories caused path doubling errors.

  - **Integration file tracking**: Added `config.local.yaml` to IMPLICIT_SYSTEMS_PATTERNS and extended `find_untracked_systems_files()`
  to scan for `hooks.local/*` and `config.local.yaml`. Found and tracked 10 previously untracked integration files across
  6 packages.

  - **publish-status fix**: Fixed `sysreg_publish_status()` CLI to accept bare `--name` flag (added `nargs="?"`) so MCP tool
  works without a package name.


  ### Documentation updates

  - Updated CLAUDE.md committing instructions with `cd` prefix behavior

  - Updated ADR 0001 vcsh architecture with path rules and `-f` flag requirements


  ### Package cleanup

  - **pdf-tools**: Moved output directory inside the package (from orphan `tools/pdf-output`), updated default path in cli.py,
  gitignored output/

  - **Worktree migration**: Fixed 3 repos (obs-pipewire-camera, portfolio-editor, wayfire-keybindings) with remnant HOME-based
  file paths

  - **Gitignore**: Added `*.egg-info/` to 5 ComfyUI package repos

  - **comfyui-easy-randomize**: Fixed escape sequence handling in string joiner nodes

  - **mcp**: Switched to `ensure_importable()` for Redis import, added PATH lookup for bare commands in package_loader

  - **portfolio-site**: Fixed preview path resolution, added 3 new project entries


  ## Final state

  - 63/63 packages valid, 0 errors

  - 0 untracked systems files

  - 0 ownership violations

  - All 14 touched repos clean'
