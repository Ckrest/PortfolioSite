content:
  blocks:
  - body: A set of 10 ComfyUI nodes for adding controlled randomness to image generation workflows. The core idea is random
      selection with freeze and lock — you can randomize choices across text prompts, LoRAs, images, and numbers, then freeze
      a value you like while continuing to randomize everything else. This makes iterative prompt building much faster since
      you can lock in good elements one at a time instead of re-rolling everything. Includes dedicated nodes for different
      data types and a multi-choice text node for building prompt variations.
