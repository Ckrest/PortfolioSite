  - body: Wired up the diagram tool and screenshot tool to automatically publish events when they create files, so those artifacts
      get tracked in the database and show up during work report creation. The integration uses hooks rather than direct dependencies
      — the tools themselves stay standalone with zero Systems imports, and the hook adapters handle the event publishing.
      This keeps the tools distributable as independent packages while still getting rich integration when running in the
      Systems environment.
