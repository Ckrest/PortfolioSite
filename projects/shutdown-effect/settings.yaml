content:
  blocks:
  - body: A Wayfire compositor plugin that plays visual animations during system power transitions — shutdown, reboot, and
      suspend. Ships with a fade animation as the default, and uses a hook-based discovery system so users can drop in custom
      animations (like this fire example) via XDG config directories without modifying the package itself. Works alongside
      a companion power-manager that handles the actual power state transitions.
