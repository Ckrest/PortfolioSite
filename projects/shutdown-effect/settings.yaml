# Shutdown Effect

title: Shutdown Effect
summary: Visual shutdown animations with extensible hook system for power transitions on Wayland.
date: '2026-01-18'
status: complete
size: medium
github: https://github.com/Ckrest/shutdown-effect
preview: media/2222screenshot_2026-03-01_14-03-36.png
