content:
  blocks:
  - body: '## Description:


      Web-based split-pane GUI for building portfolio project pages from work reports. Flask backend (port 9750) with vanilla
      JS frontend. Features: report browser with archive/unarchive, project CRUD with settings/content separation, block-based
      content editor, drag-drop from reports, live preview with click-to-edit overlays, tag autocomplete from controlled vocabulary,
      import report as project, deploy staging/production workflow.'
    id: blk_c2d91bcb
    type: text
  - body: '## Reasoning:


      Built to replace manual YAML editing for portfolio project pages. The tool integrates work reports (stored in PostgreSQL)
      with portfolio projects (stored as YAML files). v2 architecture replaced legacy 6-file JS with modular ES modules using
      observer pattern to break circular dependencies. Event delegation eliminates memory leaks. Connection pooling prevents
      database exhaustion. Archive feature keeps reports panel uncluttered. Import feature provides one-click project creation
      from reports. I like cats'
    id: blk_cfd62933
