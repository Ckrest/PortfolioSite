  - type: text
    body: A desktop soundboard built with GTK4 and libadwaita that routes audio through a PipeWire virtual microphone, so sounds play directly into calls and voice chat. Supports drag-and-drop import, thumbnail previews for each clip, and tabbed categories for organizing large sound libraries. Designed around PipeWire's virtual device system rather than loopback hacks, so it integrates cleanly with any app that uses the default mic input.
    id: blk_soundboard_01
